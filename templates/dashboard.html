<!DOCTYPE html>
<html>
<head>
    <title>Real Estate & Construction Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="nav">
    <div>Real Estate & Construction Portal</div>
    <div>
        <a href="/client_dashboard">Client</a>
        <a href="/builder_dashboard">Builder</a>
        <a href="/listings">Listings</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">

<h2>Dashboard</h2>

<h3>Builders</h3>
{% for b in data.builders %}
    <div class="card">
        <p><b>{{b.name}}</b> — {{b.firm}}</p>
    </div>
{% endfor %}

<h3>Clients</h3>
{% for c in data.clients %}
    <div class="card">
        <p>
            <b>{{c.name}}</b><br>
            Role: {{c.role}}<br>
            Estimated: <span class="highlight">{{c.estimate}}</span>
        </p>
    </div>
{% endfor %}

</div>
</body>
</html>
